<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Resumint Resume</title>
  <style>{{styles}}</style>
</head>
<body>
  <main class="resume">
    <header>
      <h1>{{name}}</h1>
      <p>{{contact}}</p>
    </header>

    <section aria-label="Experience">
      <h2>Experience</h2>
      {{experience}}
    </section>

    <section aria-label="Education">
      <h2>Education</h2>
      {{education}}
    </section>

    <section aria-label="Projects">
      <h2>Projects</h2>
      <ul>{{projects}}</ul>
    </section>

    <section aria-label="Skills">
      <h2>Skills</h2>
      <ul class="compact-list">{{skills}}</ul>
    </section>

    <section aria-label="Certifications">
      <h2>Certifications</h2>
      <ul>{{certifications}}</ul>
    </section>
  </main>
</body>
</html>
